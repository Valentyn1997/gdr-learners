# @package _global_
model:
  nuisance:
    beta: 1.0

    vae_hid_dim: 3
    vae_lat_dim: 5
    noise_std_X: 0.1         # noise regularization for covariates, \sigma^2_x
    lr: 0.0001                # learning rate for the nuisance VAE, \eta_\text{N}
    batch_size: 32           # batch size for the nuisance network, b_N

