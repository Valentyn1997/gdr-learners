# @package _global_
model:
  nuisance:
    t_dim: 20

    T: 100
    diffusion_hid_dim: 20
    noise_std_X: 0.01         # noise regularization for covariates, \sigma^2_x
    lr: 0.01                # learning rate for the nuisance VAE, \eta_\text{N}
    batch_size: 64           # batch size for the nuisance network, b_N

dataset:
  n_samples: 1250
  test_size: 0.6