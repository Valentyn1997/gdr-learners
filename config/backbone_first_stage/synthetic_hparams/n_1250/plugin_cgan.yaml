# @package _global_
model:
  nuisance:
    gan_hid_dim: 30
    noise_std_X: 0.1         # noise regularization for covariates, \sigma^2_x
    lr: 0.0005                # learning rate for the nuisance VAE, \eta_\text{N}
    batch_size: 32           # batch size for the nuisance network, b_N

dataset:
  n_samples: 1250
  test_size: 0.6